name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fL "https://github.com/nicholasgasior/gsfmt/releases/download/v0.0.1/gsfmt_linux_amd64" -o /dev/null || true
          wget -q "https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/8.9/gradle-wrapper-8.9.jar" \
            -O gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
          # Verify jar was downloaded properly
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Install Gradle directly
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Show project structure
        run: find . -type f -name "*.kt" -o -name "*.kts" -o -name "*.xml" | sort

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --info 2>&1 | tail -100

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ManifestAI-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/reports/
            app/build/outputs/logs/
          retention-days: 3
